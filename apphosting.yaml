# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
  memoryMiB: 2048

# Environment variables for the App Hosting backend
env:
  - variable: EBAY_ENV
    value: production

# Secrets for the App Hosting backend (single source of truth in Secret Manager)
secrets:
  - variable: AGENT_SERVICE_URL
    secret: AGENT_SERVICE_URL
  - variable: EBAY_CLIENT_ID
    secret: EBAY_CLIENT_ID
  - variable: EBAY_CLIENT_SECRET
    secret: EBAY_CLIENT_SECRET
  # App Hosting exposes GEMINI_API_KEY; value comes from canonical GOOGLE_GENAI_API_KEY secret
  - variable: GEMINI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
