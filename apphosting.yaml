# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
  memoryMiB: 2048

# Environment variables for the App Hosting backend
env:
  - variable: EBAY_ENV
    value: production

# Secrets for the App Hosting backend
secrets:
  - variable: EBAY_CLIENT_ID
    secret: EBAY_CLIENT_ID
  - variable: EBAY_CLIENT_SECRET
    secret: EBAY_CLIENT_SECRET
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: AGENT_SERVICE_URL
    secret: AGENT_SERVICE_URL
