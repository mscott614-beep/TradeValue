# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  maxInstances: 1
  memoryMiB: 2048

# Environment variables and secrets (must live under `env`, not a separate `secrets` block)
env:
  - variable: EBAY_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  - variable: AGENT_SERVICE_URL
    secret: AGENT_SERVICE_URL
    availability:
      - RUNTIME

  - variable: EBAY_CLIENT_ID
    secret: EBAY_CLIENT_ID
    availability:
      - RUNTIME

  - variable: EBAY_CLIENT_SECRET
    secret: EBAY_CLIENT_SECRET
    availability:
      - RUNTIME

  # App Hosting exposes GEMINI_API_KEY; value comes from canonical GOOGLE_GENAI_API_KEY secret
  - variable: GEMINI_API_KEY
    secret: GOOGLE_GENAI_API_KEY
    availability:
      - BUILD
      - RUNTIME

  - variable: USE_LOCAL_LLM
    value: "true"
    availability:
      - RUNTIME

  - variable: LOCAL_LLM_URL
    value: "https://learned-lamp-oxide-dozens.trycloudflare.com"
    availability:
      - RUNTIME

  - variable: LOCAL_LLM_MODEL
    value: "gemma4:12b"
    availability:
      - RUNTIME

